<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Papers Database - DTZ ANUWH OFFICIAL</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
overflow-x:hidden;
}

/* ================= LOADER ================= */

#loader-wrapper{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
text-align:center;
}

.loader-content{max-width:400px;}

.bot-title{font-size:28px;font-weight:800;margin-bottom:10px;}
.subtitle{font-size:14px;margin-bottom:25px;color:#aaa;}

.spinner-container{margin:20px 0;}
.spinner{
width:60px;
height:60px;
border:6px solid #222;
border-top:6px solid #00c6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress-container{margin-top:20px;}
.percentage{margin-bottom:5px;font-weight:600;}
.progress-bar{
width:100%;
height:8px;
background:#222;
border-radius:20px;
overflow:hidden;
}
.progress-fill{
height:100%;
width:0%;
background:#00c6ff;
transition:0.3s;
}

.status{margin-top:10px;color:#aaa;font-size:14px;}
.footer-info{margin-top:30px;font-size:12px;color:#666;}

/* ================= NAVBAR ================= */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
position:sticky;
top:0;
}

.logo{font-weight:800;font-size:20px;}

.menu{display:flex;gap:25px;}
.menu a{color:white;text-decoration:none;transition:0.3s;}
.menu a:hover{color:#00c6ff;}

.hamburger{display:none;flex-direction:column;cursor:pointer;}
.hamburger span{height:3px;width:25px;background:white;margin:4px 0;}

@media(max-width:768px){
.menu{
display:none;
flex-direction:column;
background:#111;
padding:20px;
position:absolute;
right:20px;
top:70px;
}
.menu.active{display:flex;}
.hamburger{display:flex;}
}

/* ================= PAGE ================= */

.hero{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:30px;
}

.search-box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px #00c6ff;
max-width:600px;
width:100%;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:15px;
outline:none;
}

.search-box button{
padding:12px 25px;
border:none;
background:#00c6ff;
color:black;
cursor:pointer;
font-weight:600;
border-radius:8px;
}

.result-card{
margin-top:30px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
box-shadow:0 0 40px #00c6ff;
display:none;
}

.result-card button{
margin-top:15px;
padding:10px 25px;
border:none;
background:#00c6ff;
color:black;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
margin-top:60px;
}
</style>
</head>

<body>

<!-- ================= YOUR LOADER ================= -->

<div id="loader-wrapper">
    <div class="loader-content">
        <h1 class="bot-title">ANUGA OFFICIAL</h1>
        <p class="subtitle">Past Paper Downloader</p>

        <div class="spinner-container">
            <div class="spinner"></div>
        </div>

        <div class="progress-container">
            <div class="percentage" id="percent">0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="fill"></div>
            </div>
        </div>

        <p class="status" id="status-text">Loading...</p>

        <div class="footer-info">
            <p>© 2025 - 2026 Powered By <br>Anuga Senithu</p>
        </div>
    </div>
</div>

<!-- ================= NAV ================= -->

<nav>
<div class="logo">DTZ ANUWH OFFICIAL</div>

<div class="menu" id="menu">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/projects">Projects</a>
<a href="/contact">Contact</a>
<a href="/freebots">Free Bots</a>
<a href="/pastpaperdb">Past Papers</a>
</div>

<div class="hamburger" onclick="toggleMenu()">
<span></span><span></span><span></span>
</div>
</nav>

<!-- ================= CONTENT ================= -->

<section class="hero">
<h1>Past Papers Database</h1>

<div class="search-box">
<input type="text" id="subject" placeholder="Enter Subject (Example: Maths)">
<button onclick="searchPapers()">Search Papers</button>
</div>

<div class="result-card" id="resultCard">
<h2 id="paperTitle"></h2>
<p>Click below to download past paper.</p>
<button id="downloadBtn">Download Paper</button>
</div>

</section>

<footer>
Designed and Developed by Anuga Senithu
</footer>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* ===== LOADER PROGRESS ===== */

let percent = 0;
let loaderInterval = setInterval(()=>{
percent++;
document.getElementById("percent").innerText = percent + "%";
document.getElementById("fill").style.width = percent + "%";

if(percent >= 100){
clearInterval(loaderInterval);
document.getElementById("status-text").innerText = "Loaded Successfully!";
setTimeout(()=>{
document.getElementById("loader-wrapper").style.display="none";
},500);
}
},20);

/* ===== PAST PAPER FETCH ===== */

async function searchPapers(){
const subject = document.getElementById("subject").value.trim();
if(!subject){alert("Enter Subject");return;}

document.getElementById("resultCard").style.display="none";

try{
const response = await fetch("https://chathurawiki.netlify.app/?q=" + encodeURIComponent(subject));
const data = await response.json();

if(!data || data.length === 0){
alert("No papers found.");
return;
}

const firstPaper = data[0];

document.getElementById("paperTitle").innerText = firstPaper.title || subject;

document.getElementById("downloadBtn").onclick = function(){
window.open(firstPaper.download, "_blank");
};

document.getElementById("resultCard").style.display="block";

}catch(error){
alert("Error fetching papers.");
console.error(error);
}
}
</script>

</body>
</html>
