<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - DTZ ANUWH OFFICIAL</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;color:white;overflow-x:hidden;}
body::before{content:"";position:fixed;width:600px;height:600px;background:radial-gradient(circle,#00c6ff,transparent);top:-200px;left:-200px;filter:blur(120px);z-index:-1;animation:float 8s infinite alternate;}
@keyframes float{from{transform:translate(0,0);}to{transform:translate(200px,200px);}}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);position:sticky;top:0;z-index:1000;}
.logo{font-weight:800;font-size:20px;}
.menu{display:flex;gap:25px;}
.menu a{color:white;text-decoration:none;transition:0.3s;}
.menu a:hover{color:#00c6ff;}
.hamburger{display:none;flex-direction:column;cursor:pointer;}
.hamburger span{height:3px;width:25px;background:white;margin:4px 0;}
#loader-wrapper{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;overflow:hidden;transition:all 0.5s ease;}
.loader-content{text-align:center;color:white;font-family:'Poppins',sans-serif;}
.loader-content .bot-title{font-size:36px;font-weight:800;margin-bottom:10px;}
.loader-content .subtitle{font-size:16px;opacity:0.8;margin-bottom:30px;}
.spinner-container{margin:20px auto;width:50px;height:50px;}
.spinner{width:50px;height:50px;border:6px solid rgba(255,255,255,0.2);border-top:6px solid #00c6ff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.progress-container{width:200px;margin:20px auto;}
.progress-bar{width:100%;height:8px;background:rgba(255,255,255,0.2);border-radius:4px;overflow:hidden;margin-top:5px;}
.progress-fill{width:0%;height:100%;background:#00c6ff;border-radius:4px;transition:width 0.3s;}
.percentage{margin-bottom:5px;}
.status{margin-top:10px;font-size:14px;opacity:0.8;}
.footer-info{margin-top:30px;font-size:12px;opacity:0.5;}
.hero{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;text-align:center;padding:60px;}
.contact-form{background:rgba(255,255,255,0.05);padding:30px;border-radius:20px;box-shadow:0 0 40px #00c6ff;max-width:600px;width:100%;margin-top:30px;display:flex;flex-direction:column;gap:15px;}
.contact-form input,.contact-form textarea{padding:10px;border-radius:10px;border:none;width:100%;font-family:'Poppins',sans-serif;}
.contact-form button{padding:10px 25px;border:none;background:#00c6ff;color:black;cursor:pointer;}
footer{text-align:center;padding:20px;background:rgba(255,255,255,0.05);}
@media(max-width:768px){.menu{display:none;flex-direction:column;background:#111;padding:20px;position:absolute;right:20px;top:70px;}.menu.active{display:flex;}.hamburger{display:flex;}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader-wrapper">
<div class="loader-content">
<h1 class="bot-title">DTZ ANUWH OFFICIAL</h1>
<p class="subtitle">Contact form of Anuga Senithu</p>
<div class="spinner-container"><div class="spinner"></div></div>
<div class="progress-container"><div class="percentage" id="percent">0%</div><div class="progress-bar"><div class="progress-fill" id="fill"></div></div></div>
<p class="status" id="status-text">Loading...</p>
<div class="footer-info"><p>© 2026 - Powered By <br >Anuga Senithu</p></div>
</div>
</div>

<nav>
<div class="logo">DTZ ANUWH OFFICIAL</div>
<div class="menu" id="menu">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/projects">Projects</a>
<a href="/contact">Contact</a>
<a href="/freebots">Free Bots</a>
<a href="/pastpaperdb.html">Past Paper</a>
</div>
<div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<section class="hero">
<h1>Contact Me</h1>

<div class="contact-form">
<input type="text" placeholder="Name" id="name">
<input type="email" placeholder="Email" id="email">
<textarea placeholder="Message" id="message" rows="5"></textarea>
<button onclick="sendWhatsApp()">Send via WhatsApp</button>
</div>

</section>

<footer>Designed and Developed by Anuga Senithu</footer>

<script>
document.addEventListener("DOMContentLoaded",function(){
const hamburger=document.getElementById("hamburger");
const menu=document.getElementById("menu");
hamburger.addEventListener("click",()=>{menu.classList.toggle("active");});
let percent=document.getElementById("percent");
let fill=document.getElementById("fill");
let load=0;
let interval=setInterval(()=>{load++;percent.innerText=load+"%";fill.style.width=load+"%";if(load>=100){clearInterval(interval);document.getElementById("loader-wrapper").style.opacity="0";setTimeout(()=>{document.getElementById("loader-wrapper").style.display="none";},500);}},20);
});
function sendWhatsApp(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let message=document.getElementById("message").value;
let text=`Name: ${name}%0AEmail: ${email}%0AMessage: ${message}`;
window.open(`https://wa.me/94776579018?text=${text}`,'_blank');
}
</script>

</body>
</html>
